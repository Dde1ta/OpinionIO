# Docker Compose Example for Models with Volume Mounts
# This shows how to mount model artifacts as volumes

version: '3.8'

services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  # ===== XGBoost Model =====
  xgboost:
    build:
      context: .
      dockerfile: Models/XGBoost/dockerfile
    container_name: xgboost-model
    depends_on:
      - kafka
    environment:
      ENVIRONMENT: docker
      KAFKA_BROKER_URL: kafka
      KAFKA_BROKER_PORT: 9092
      INTERNAL_API_URL: http://internal-api:8001
      EXTERNAL_API_URL: http://external-api:8000
      DATABASE_URL: postgresql+asyncpg://postgres:root@postgres:5432/major
    # Mount model artifacts from host directory
    volumes:
      - ./Models/models:/app/Models/models:ro  # Read-only mount
    networks:
      - ml-network

  # ===== TinyBERT Model =====
  tinybert:
    build:
      context: .
      dockerfile: Models/TinyBert/dockerfile
    container_name: tinybert-model
    depends_on:
      - kafka
    environment:
      ENVIRONMENT: docker
      KAFKA_BROKER_URL: kafka
      KAFKA_BROKER_PORT: 9092
      INTERNAL_API_URL: http://internal-api:8001
      EXTERNAL_API_URL: http://external-api:8000
      DATABASE_URL: postgresql+asyncpg://postgres:root@postgres:5432/major
    # Mount model artifacts from host directory
    volumes:
      - ./Models/models:/app/Models/models:ro  # Read-only mount
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge

volumes:
  models-volume:
    driver: local
